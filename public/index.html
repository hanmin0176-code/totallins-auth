<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totallins Auth</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #10233d;
        --muted: #58708f;
        --line: #dbe4ef;
        --accent: #0b6ef3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 65%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 18px 50px rgba(16, 35, 61, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      code {
        background: #eef4fb;
        padding: 2px 8px;
        border-radius: 999px;
        color: var(--accent);
      }

      ul {
        margin: 24px 0 0;
        padding-left: 20px;
      }

      li {
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Totallins Auth</h1>
        <p>공통 로그인, 세션, 계정 활성화를 담당하는 인증 서비스입니다.</p>
        <p>배포 후에는 <code>/api/health</code> 와 <code>/api/auth/me</code> 로 기본 동작을 확인하세요.</p>
        <ul>
          <li><code>POST /api/auth/login</code></li>
          <li><code>GET /api/auth/me</code></li>
          <li><code>POST /api/auth/logout</code></li>
          <li><code>POST /api/auth/activate</code></li>
        </ul>
      </section>
    </main>
  </body>
  </html>
